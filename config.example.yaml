# Radio Automation Config
# Copy this to config.yaml and fill in your values

email:
  imap_server: "imap.gmail.com"
  imap_port: 993
  username: "yourstation@gmail.com"
  password: "your-app-password"        # Use Gmail App Password, not your real password
  # Filter: only process emails matching these criteria
  from_filter: ""                       # e.g. "notifications@theirservice.com"
  subject_filter: ""                    # e.g. "New audio available"
  processed_folder: "Processed"         # Move emails here after success

sftp:
  host: "192.168.15.120"                # Primary host (LAN — tried first)
  port: 22                              # LAN port (default SSH)
  host_fallback: "199.192.90.28"        # Fallback host (WAN)
  port_fallback: 51407                  # WAN port
  username: "rd"
  password: ""                          # SFTP password
  remote_dir: "/"                       # Directory to look for audio files
  filename_pattern: "*.wav"             # Glob pattern for audio files

transcode:
  input_format: "wav"
  output_format: "mp2"
  sample_rate: 44100
  bitrate: "384k"                       # Common for broadcast MP2

prx:
  # PRX Exchange login (exchange.prx.org)
  username: ""
  password: ""
  # Optional: series ID to attach pieces to
  series_id: ""
  # Producer name for pieces
  producer_name: "Lisa Adams"
  # Path to image file for pieces (relative to project dir)
  image_path: "assets/piece-image.jpg"
  # Default tags for pieces
  default_tags: ["community-radio", "letters-from-an-american", "heather-cox-richardson"]
  default_description: ""
  # Set to true to auto-publish (false = save as draft)
  auto_publish: true
  # Run browser visibly (false) or hidden (true)
  # Set to false for debugging so you can watch what it does
  headless: false

schedule:
  # Polling window (Eastern Time)
  start_hour: 11                        # 11 AM ET
  end_hour: 20                          # 8 PM ET
  check_interval_minutes: 15
  timezone: "US/Eastern"

logging:
  level: "INFO"
  file: "radio-automation.log"

paths:
  download_dir: "./downloads"
  output_dir: "./output"
  processed_log: "./processed.json"
